name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [23.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm lint
        working-directory: frontend

      - name: Build project (includes type checking)
        run: pnpm build
        working-directory: frontend

      - name: Upload build artifacts
        if: matrix.node-version == '23.x'
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [23.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma:generate
        working-directory: backend

      - name: Run linter
        run: pnpm lint
        working-directory: backend

      - name: Type check
        run: pnpm typecheck
        working-directory: backend

      - name: Build project
        run: pnpm build
        working-directory: backend

      - name: Upload build artifacts
        if: matrix.node-version == '23.x'
        uses: actions/upload-artifact@v5
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7
